name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # 检测哪些应用需要部署
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      admin: ${{ steps.filter.outputs.admin }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            admin:
              - 'apps/admin/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            server:
              - 'apps/server/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # 部署 Admin 应用
  deploy-admin:
    name: Deploy Admin App
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.admin == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Deploy admin to Cloudflare
        working-directory: ./apps/admin
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          NODE_ENV: production

      - name: Deploy notification
        if: success()
        run: echo "✅ Admin app deployed successfully!"

  # 部署 Server 应用
  deploy-server:
    name: Deploy Server App
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy server to Cloudflare
        run: pnpm run deploy
        working-directory: ./apps/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync server secrets (Optional)
        if: false # 按需启用，需要配置额外的环境变量
        run: pnpm run sync:secrets
        working-directory: ./apps/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy notification
        if: success()
        run: echo "✅ Server app deployed successfully!"

  # 部署完成通知
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy-admin, deploy-server]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Application | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-admin.result }}" == "success" ]; then
            echo "| Admin App | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-admin.result }}" == "skipped" ]; then
            echo "| Admin App | ⏭️ Skipped (No changes) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Admin App | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-server.result }}" == "success" ]; then
            echo "| Server App | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.deploy-server.result }}" == "skipped" ]; then
            echo "| Server App | ⏭️ Skipped (No changes) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Server App | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
